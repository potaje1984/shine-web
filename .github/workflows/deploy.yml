# Build y deploy automático a GitHub Pages cuando se hace push a main.
# Requiere configurar los secrets de Firebase en:
#   Settings → Secrets and variables → Actions → New repository secret
#
# Secrets necesarios (valores de tu .env local):
#   VITE_FIREBASE_API_KEY
#   VITE_FIREBASE_AUTH_DOMAIN
#   VITE_FIREBASE_PROJECT_ID
#   VITE_FIREBASE_STORAGE_BUCKET
#   VITE_FIREBASE_MESSAGING_SENDER_ID
#   VITE_FIREBASE_APP_ID
#   VITE_FIREBASE_FUNCTIONS_REGION  (opcional, default us-central1)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ──────────────────────────────────────────────────────────────
      # Configurar variables de entorno para el build.
      #
      # Vite "bakea" (incrusta) las variables VITE_* en el bundle
      # en tiempo de build. Por eso hay que pasarlas aquí; si no,
      # el bundle tendría `undefined` y la app se vería en blanco.
      # ──────────────────────────────────────────────────────────────
      - name: Configure environment
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_FUNCTIONS_REGION: ${{ secrets.VITE_FIREBASE_FUNCTIONS_REGION }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          echo "::group::Verificación de secrets"
          MISSING=()
          [ -z "$VITE_FIREBASE_API_KEY" ] && MISSING+=("VITE_FIREBASE_API_KEY")
          [ -z "$VITE_FIREBASE_AUTH_DOMAIN" ] && MISSING+=("VITE_FIREBASE_AUTH_DOMAIN")
          [ -z "$VITE_FIREBASE_PROJECT_ID" ] && MISSING+=("VITE_FIREBASE_PROJECT_ID")
          [ -z "$VITE_FIREBASE_STORAGE_BUCKET" ] && MISSING+=("VITE_FIREBASE_STORAGE_BUCKET")
          [ -z "$VITE_FIREBASE_MESSAGING_SENDER_ID" ] && MISSING+=("VITE_FIREBASE_MESSAGING_SENDER_ID")
          [ -z "$VITE_FIREBASE_APP_ID" ] && MISSING+=("VITE_FIREBASE_APP_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Faltan secrets: ${MISSING[*]}"
            echo "::error::Configúralos en: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✓ Todos los secrets de Firebase están presentes"
          echo "::endgroup::"

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_FUNCTIONS_REGION: ${{ secrets.VITE_FIREBASE_FUNCTIONS_REGION }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "::error::Build no generó archivos en dist/"
            exit 1
          fi
          echo "✓ dist/ contiene $(ls dist | wc -l) elementos"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
